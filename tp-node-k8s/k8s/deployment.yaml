apiVersion: apps/v1
kind: Deployment
metadata:
  name: tp-docker-hub-app
spec:
  replicas: 2
  selector:
    matchLabels:
      app: tp-docker-hub-app
  template:
    metadata:
      labels:
        app: tp-docker-hub-app
    spec:
      imagePullSecrets:
        - name: regcred
      containers:
        - name: web
          image: docker.io/remytr/tp-docker-hub-app:1.0.0
          ports:
            - containerPort: 3000
          env:
            - name: PORT
              value: "3000"
          resources:
            requests:
              cpu: "50m"
              memory: "64Mi"
            limits:
              cpu: "200m"
              memory: "128Mi"
          readinessProbe:
            httpGet:
              path: /healthz
              port: 3000
            initialDelaySeconds: 3
            periodSeconds: 5
          livenessProbe:
            httpGet:
              path: /healthz
              port: 3000
            initialDelaySeconds: 10
            periodSeconds: 10
