apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: dev-user-developer
  namespace: app-dev
subjects:
- kind: ServiceAccount
  name: dev-user
  namespace: app-dev  # SA défini dans app-dev, utilisable via RoleBinding cross-namespace
roleRef:
  kind: Role
  name: developer-role
  apiGroup: rbac.authorization.k8s.io
