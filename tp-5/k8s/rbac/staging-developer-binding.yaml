apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: dev-user-developer
  namespace: app-staging
subjects:
  # Le même SA dev-user (défini dans app-dev) est lié en staging.
  # Un seul token suffit pour accéder aux deux namespaces autorisés.
- kind: ServiceAccount
  name: dev-user
  namespace: app-dev
roleRef:
  kind: Role
  name: developer-role
  apiGroup: rbac.authorization.k8s.io
