apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: qa-role
  namespace: app-staging
rules:
  # QA a un accès "safe" : lecture seule + logs pour le debug
- apiGroups: [""]
  resources: ["pods", "services", "configmaps", "endpoints", "events"]
  verbs: ["get", "list", "watch"]
- apiGroups: [""]
  resources: ["pods/log"]
  verbs: ["get"]
  # Lecture des déploiements nécessaire pour surveiller les rollouts
- apiGroups: ["apps"]
  resources: ["deployments", "replicasets"]
  verbs: ["get", "list", "watch"]
  # patch sur deployments permet "kubectl rollout restart" (ajoute une annotation).
  # Pas de create/delete : QA ne peut pas supprimer un déploiement par erreur.
- apiGroups: ["apps"]
  resources: ["deployments"]
  verbs: ["patch"]
