# Service Accounts simulant les personas du TP.
# En entreprise, ces identités viendraient d'un IdP via OIDC (Google, Azure AD...).
# Ici on utilise des SAs Kubernetes avec tokens pour simuler les contextes kubectl.
apiVersion: v1
kind: ServiceAccount
metadata:
  name: dev-user
  namespace: app-dev
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: qa-user
  namespace: app-staging
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: prod-deployer
  namespace: app-prod
