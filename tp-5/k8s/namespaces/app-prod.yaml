apiVersion: v1
kind: Namespace
metadata:
  name: app-prod
  labels:
    app.kubernetes.io/part-of: demo-app
    environment: prod
    owner: platform-team
    # PSS restricted en prod : enforce bloque au moment de l'admission.
    # runAsNonRoot, allowPrivilegeEscalation:false, capabilities drop ALL, seccompProfile obligatoires.
    pod-security.kubernetes.io/enforce: restricted
    pod-security.kubernetes.io/warn: restricted
    pod-security.kubernetes.io/audit: restricted
