# CE MANIFEST EST VOLONTAIREMENT NON CONFORME PSS RESTRICTED.
# Il doit être REFUSÉ dans app-prod et ACCEPTÉ (avec warning) dans app-dev.
# Usage : kubectl apply -f bad-pod-pss.yaml -n app-prod  -> doit échouer
#         kubectl apply -f bad-pod-pss.yaml -n app-dev   -> accepté (baseline)
apiVersion: v1
kind: Pod
metadata:
  name: bad-pod-pss-test
spec:
  containers:
  - name: bad-container
    image: busybox:1.36
    command: ["sleep", "3600"]
    securityContext:
      # Violation PSS restricted : allowPrivilegeEscalation non false
      allowPrivilegeEscalation: true
      # Violation : capabilities non droppées
      capabilities:
        add: ["NET_ADMIN"]
      # runAsNonRoot absent -> Kubernetes l'interprète comme root possible
