# CE MANIFEST DÉPASSE VOLONTAIREMENT LE QUOTA DE app-dev.
# La ResourceQuota dev limite limits.cpu à 2 total.
# Ce deployment demande 3 CPU en limits -> doit être rejeté.
# Usage : kubectl apply -f quota-overflow.yaml -n app-dev
apiVersion: apps/v1
kind: Deployment
metadata:
  name: quota-overflow-test
  namespace: app-dev
spec:
  replicas: 1
  selector:
    matchLabels:
      app: quota-overflow-test
  template:
    metadata:
      labels:
        app: quota-overflow-test
    spec:
      containers:
      - name: greedy
        image: busybox:1.36
        command: ["sleep", "3600"]
        resources:
          requests:
            cpu: "3"      # Dépasse le quota total du namespace (limits.cpu: 2)
            memory: "64Mi"
          limits:
            cpu: "3"
            memory: "128Mi"
