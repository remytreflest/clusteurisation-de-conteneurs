apiVersion: v1
kind: LimitRange
metadata:
  name: prod-limitrange
  namespace: app-prod
spec:
  limits:
  - type: Container
    # En prod : les requests/limits sont obligatoires dans les manifests (pas de default ici).
    # Si un manifest ne les précise pas, le pod est rejeté -> force les équipes à dimensionner explicitement.
    # On garde quand même un default pour les pods système éventuels.
    default:
      cpu: "200m"
      memory: "256Mi"
    defaultRequest:
      cpu: "100m"
      memory: "128Mi"
    max:
      cpu: "2"
      memory: "2Gi"
    # min obligatoire : empêche les manifests avec requests=0 (anti-pattern dangereux)
    min:
      cpu: "50m"
      memory: "64Mi"
